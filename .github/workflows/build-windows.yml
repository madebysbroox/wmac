name: Build Windows Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run package:win -- --publish never

      - name: Publish public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "windows-installer"
          $title = "Payment Tracker Windows Installer"
          $notes = "Download the installer below. This release is updated automatically from the latest successful Windows build. The app also uses this release to check for updates."
          $installer = Get-ChildItem -Path release -Filter "*.exe" | Select-Object -First 1
          $latest = Get-ChildItem -Path release -Filter "latest.yml" | Select-Object -First 1
          $blockMap = Get-ChildItem -Path release -Filter "*.blockmap" | Select-Object -First 1

          if (-not $installer) {
            throw "No installer found in release/*.exe"
          }

          if (-not $latest) {
            throw "No updater metadata found at release/latest.yml"
          }

          git tag -f $tag
          git push origin "refs/tags/$tag" --force

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $title --notes $notes --latest
          } else {
            gh release create $tag --title $title --notes $notes --latest
          }

          $existingAssets = gh release view $tag --json assets --jq ".assets[].name"
          if ($existingAssets) {
            foreach ($assetName in $existingAssets) {
              gh release delete-asset $tag $assetName --yes
            }
          }

          $assets = @($installer.FullName, $latest.FullName)
          if ($blockMap) {
            $assets += $blockMap.FullName
          }

          foreach ($asset in $assets) {
            gh release upload $tag $asset --clobber
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: payment-tracker-windows-installer
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
